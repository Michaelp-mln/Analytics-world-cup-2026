name: build-and-deploy

# A cada push na main: builda a imagem, publica no GHCR e faz deploy no VPS.
on:
  push:
    branches: [main]
  workflow_dispatch:            # permite disparar manualmente pela aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # necessário para publicar no GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Define nome da imagem (minúsculo)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3     # emulação p/ build arm64

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3   # driver container -> habilita cache gha

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64    # roda em VPS x86 e na VM ARM do Oracle
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verifica se o VPS está configurado
        id: cfg
        run: |
          if [ -n "${{ secrets.SSH_HOST }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets SSH ausentes — deploy pulado. Configure SSH_HOST/SSH_USER/SSH_KEY quando tiver o VPS."
          fi

      - name: Deploy via SSH
        if: steps.cfg.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/app
            git pull --ff-only
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

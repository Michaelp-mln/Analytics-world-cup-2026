# ======================================================================
# WC 2026 Analytics — orquestração completa
#
#   kafka            -> broker de eventos (KRaft, sem Zookeeper)
#   postgres         -> event store (event sourcing) + read models
#   ingestion        -> ETL: API-Football/simulador -> Kafka  (produtor)
#   eventstore-writer-> Kafka -> tabela append-only de eventos (consumidor)
#   projector        -> Kafka -> read models / projeções        (consumidor)
#   api              -> FastAPI: REST + WebSocket + dashboard
# ======================================================================

x-app: &app-base
  build: .
  env_file: [.env]
  environment:
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    POSTGRES_DSN: postgresql://wc2026:wc2026@postgres:5432/wc2026
  depends_on:
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: wc2026-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  postgres:
    image: postgres:16
    container_name: wc2026-postgres
    environment:
      POSTGRES_USER: wc2026
      POSTGRES_PASSWORD: wc2026
      POSTGRES_DB: wc2026
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc2026 -d wc2026"]
      interval: 5s
      timeout: 5s
      retries: 15

  ingestion:
    <<: *app-base
    container_name: wc2026-ingestion
    command: python -m wc2026.ingestion.service

  eventstore-writer:
    <<: *app-base
    container_name: wc2026-eventstore-writer
    command: python -m wc2026.processing.eventstore_consumer

  projector:
    <<: *app-base
    container_name: wc2026-projector
    command: python -m wc2026.processing.projectors

  api:
    <<: *app-base
    container_name: wc2026-api
    command: uvicorn wc2026.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

volumes:
  pgdata:
